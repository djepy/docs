# Template: nightly board review.
#
# This file is a template, not an active workflow. To activate, copy to
# .github/workflows/nightly-board-review.yml in the ops repo. We don't activate
# it inside djepy/docs (a fork of github/docs) because scheduled workflows on
# GitHub forks have surprising behavior and we don't want noise here.
#
# What it does: every morning at 06:00 UTC, scans BOARD.md for items past their
# `[due: YYYY-MM-DD]` and either opens or comments on a daily issue listing them.
# Fails loudly if BOARD.md is missing.

name: Nightly board review

on:
  schedule:
    # 06:00 UTC daily. Adjust to the user's morning.
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Sanity-check BOARD.md exists
        run: test -f BOARD.md || (echo "BOARD.md missing — the manager agent has nothing to read"; exit 1)

      - name: Flag overdue items
        id: overdue
        run: |
          set -euo pipefail
          TODAY=$(date -u +%Y-%m-%d)
          # Unchecked items with a `[due: YYYY-MM-DD]` strictly before today.
          grep -E '^\s*- \[ \].*\[due: [0-9]{4}-[0-9]{2}-[0-9]{2}\]' BOARD.md \
            | awk -v today="$TODAY" '{
                if (match($0, /\[due: [0-9]{4}-[0-9]{2}-[0-9]{2}\]/)) {
                  due = substr($0, RSTART+6, 10);
                  if (due < today) print $0;
                }
              }' > /tmp/overdue.txt || true
          if [ -s /tmp/overdue.txt ]; then
            {
              echo "## Overdue items in BOARD.md as of $TODAY"
              echo
              cat /tmp/overdue.txt
              echo
              echo "_Generated by .github/workflows/nightly-board-review.yml_"
            } > /tmp/issue.md
            echo "has_overdue=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_overdue=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open / update daily overdue issue
        if: steps.overdue.outputs.has_overdue == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TITLE="Overdue: $(date -u +%Y-%m-%d) board review"
          EXISTING=$(gh issue list --search "$TITLE in:title" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body-file /tmp/issue.md
          else
            gh issue create --title "$TITLE" --body-file /tmp/issue.md --label overdue,board
          fi
